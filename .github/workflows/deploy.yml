name: Deploy to Windows Server

# mainブランチへのpush時に実行
on:
  push:
    branches:
      - main  # ブランチ名がmasterの場合は変更してください

# 環境変数の設定
env:
  NODE_VERSION: '20.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. リポジトリのチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Node.jsのセットアップ
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # 3. 依存関係のインストール
      - name: Install dependencies
        run: npm ci

      # 4. プロジェクトのビルド
      - name: Build project
        run: npm run build

      # 5. ビルド結果の確認
      - name: List build output
        run: ls -la docs/

      # 6. WindowsサーバーへのデプロイメントをSSH経由で実行
      - name: Deploy to Windows Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "docs/*"
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 1  # docsディレクトリを除外してコピー
          rm: true  # 転送前にターゲットディレクトリをクリア

      # 7. デプロイ完了の確認
      - name: Post-deployment verification
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            echo "Deployment completed successfully at $(date)"
            echo "Files in deployment directory:"
            ls -la ${{ secrets.DEPLOY_PATH }}

      # 8. デプロイ成功通知
      - name: Deployment Success
        if: success()
        run: |
          echo "✅ Deployment to Windows Server completed successfully!"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"

      # 9. デプロイ失敗通知
      - name: Deployment Failed
        if: failure()
        run: |
          echo "❌ Deployment to Windows Server failed!"
          echo "Please check the logs for details."
